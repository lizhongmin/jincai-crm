server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:h2:mem:crm;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: test-secret-test-secret-test-secret
    expiration-seconds: 3600
  miniapp:
    mock-enabled: true
    mock-code-prefix: "mock:"
  file:
    upload-dir: ./target/test-uploads
  order:
    auto-cancel:
      enabled: false
