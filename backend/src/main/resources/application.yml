server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://123.56.146.152:3306/travel_crm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Lzm@1988}
    driver-class-name: com.mysql.cj.jdbc.Driver
      # HikariCP连接池配置
    hikari:
      # 连接最大存活时间(建议小于MySQL的wait_timeout, 默认28000秒)
      max-lifetime: 1800000
      # 连接超时时间
      connection-timeout: 20000
      # 空闲连接超时时间
      idle-timeout: 600000
      # 池中维持的最小空闲连接数
      minimum-idle: 5
      # 池中允许的最大连接数
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:123.56.146.152}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:RuiYu@2023}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-change-this-secret}
    expiration-seconds: ${JWT_EXPIRE_SECONDS:86400}
  file:
    upload-dir: ${UPLOAD_DIR:D:/workspace/uploads/travel-crm}

logging:
  level:
    org.hibernate.SQL: info
